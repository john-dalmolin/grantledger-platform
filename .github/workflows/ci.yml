name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

  postgres-integration:
    name: Postgres Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: grantledger_rls
          POSTGRES_USER: grantledger_admin
          POSTGRES_PASSWORD: grantledger_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U grantledger_admin -d grantledger_rls"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://grantledger_app:grantledger_app@localhost:5432/grantledger_rls
      ADMIN_DATABASE_URL: postgresql://grantledger_admin:grantledger_admin@localhost:5432/grantledger_rls

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Provision application database role
        run: |
          node -e "const { Client } = require('pg'); (async () => { const client = new Client({ connectionString: process.env.ADMIN_DATABASE_URL }); await client.connect(); await client.query(\"DO $$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'grantledger_app') THEN CREATE ROLE grantledger_app LOGIN PASSWORD 'grantledger_app' NOSUPERUSER NOCREATEDB NOCREATEROLE NOREPLICATION; END IF; END $$;\"); await client.query(\"GRANT CONNECT ON DATABASE grantledger_rls TO grantledger_app;\"); await client.query(\"GRANT USAGE, CREATE ON SCHEMA public TO grantledger_app;\"); await client.end(); })().catch((error) => { console.error(error); process.exit(1); });"

      - name: Apply migrations
        run: npm run db:migrate

      - name: Run Postgres integration tests
        run: npm run test:pg
